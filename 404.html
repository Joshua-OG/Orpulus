<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Page not found - Orpulus"/>
  <meta name="theme-color" content="#07090F"/>
  <title>404 - Signal Lost | Orpulus</title>
  
  <!-- Orpulus Core Styles -->
  <link rel="stylesheet" href="css/main.css"/>
  <link rel="stylesheet" href="css/animations.css"/>
  
  <style>
    /* Custom 404 Animations & Layout */
    .error-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      text-align: center;
      padding: 20px;
    }
    .error-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--bg-base) 0%, #0D1322 50%, var(--bg-card) 100%);
      z-index: 0;
    }
    .error-content {
      position: relative;
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    /* Glitch Effect */
    .glitch-wrapper {
      position: relative;
      margin-bottom: 10px;
    }
    .glitch-text {
      font-family: var(--font-display);
      font-size: clamp(6rem, 20vw, 14rem);
      font-weight: 700;
      line-height: 1;
      color: var(--text-primary);
      position: relative;
      letter-spacing: 0.05em;
      text-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .glitch-text::before,
    .glitch-text::after {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0.8;
    }
    .glitch-text::before {
      color: var(--cyan);
      z-index: -1;
      animation: glitch-anim-1 2.5s infinite linear alternate-reverse;
    }
    .glitch-text::after {
      color: var(--red);
      z-index: -2;
      animation: glitch-anim-2 3s infinite linear alternate-reverse;
    }
    
    @keyframes glitch-anim-1 {
      0% { clip-path: inset(20% 0 80% 0); transform: translate(-3px, 1px); }
      20% { clip-path: inset(60% 0 10% 0); transform: translate(2px, -1px); }
      40% { clip-path: inset(40% 0 50% 0); transform: translate(-2px, 2px); }
      60% { clip-path: inset(80% 0 5% 0); transform: translate(3px, -2px); }
      80% { clip-path: inset(10% 0 70% 0); transform: translate(-1px, 1px); }
      100% { clip-path: inset(30% 0 40% 0); transform: translate(2px, -1px); }
    }
    @keyframes glitch-anim-2 {
      0% { clip-path: inset(10% 0 60% 0); transform: translate(2px, -1px); }
      20% { clip-path: inset(30% 0 20% 0); transform: translate(-2px, 2px); }
      40% { clip-path: inset(70% 0 10% 0); transform: translate(3px, 1px); }
      60% { clip-path: inset(20% 0 50% 0); transform: translate(-1px, -2px); }
      80% { clip-path: inset(50% 0 30% 0); transform: translate(2px, 2px); }
      100% { clip-path: inset(5% 0 80% 0); transform: translate(-3px, -1px); }
    }
    
    .error-title {
      font-family: var(--font-display);
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      color: var(--text-primary);
      margin-bottom: 16px;
      letter-spacing: 0.02em;
    }
    .error-desc {
      font-size: 1.05rem;
      color: var(--text-secondary);
      max-width: 480px;
      margin-bottom: 44px;
      line-height: 1.65;
    }
    
    /* Radar Sweep Background */
    .radar-scan {
      position: absolute;
      width: 800px;
      height: 800px;
      border-radius: 50%;
      border: 1px solid rgba(99,102,241,0.08);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1;
      pointer-events: none;
    }
    .radar-scan::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 50%;
      height: 50%;
      background: conic-gradient(from 0deg, transparent 65%, rgba(34,211,238,0.15) 100%);
      transform-origin: 0 0;
      animation: rotateSlow 4s linear infinite;
    }
  </style>
</head>
<body>

  <div class="error-container">
    <!-- Base Mesh Background & Blobs from Orpulus Theme -->
    <div class="error-bg hero-bg-animated"></div>
    <div class="hero-blobs" aria-hidden="true">
      <div class="blob blob-1 blob-animate-1" style="background: rgba(244,63,94,0.15); top: 10%; right: 20%;"></div>
      <div class="blob blob-2 blob-animate-2" style="background: rgba(34,211,238,0.15); bottom: 10%; left: 20%;"></div>
    </div>
    
    <!-- Radar Sweep Element -->
    <div class="radar-scan"></div>

    <!-- Content -->
    <div class="error-content reveal visible">
      <div class="glitch-wrapper">
        <div class="glitch-text" data-text="404">404</div>
      </div>
      <h1 class="error-title">Signal Lost In Transit</h1>
      <p class="error-desc">
        The network node you are looking for has been disconnected, moved, or never existed in our database.
      </p>
      <a href="index.html" class="btn-primary">
        Return to Home Page
      </a>
    </div>
  </div>

  <!-- Linking Main JS for button ripple effects -->
  <script src="js/main.js"></script>
</body>
</html>
